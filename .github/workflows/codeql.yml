name: CodeQL

# Static application security testing of the Go source. Advanced setup (committed workflow)
# because Go does not support default setup's build-mode `none`; advanced also lets us
# SHA-pin the action, scope the token, and review it like any other workflow.
# High-severity findings block merge when `codeql` is a required check. See docs/ci-cd.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1" # Mondays 05:30 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write # upload analysis results
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
