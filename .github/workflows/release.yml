name: Release

# Tag-triggered release: pushing a vX.Y.Z (or vX.Y.Z-rc.N) tag runs the project's
# quality gate against the tagged commit, then publishes binaries, archives, checksums,
# cosign signatures, SBOMs, grouped release notes, the Homebrew cask, and a provenance
# attestation via GoReleaser. See specs/003-release-distribution/contracts/release-workflow.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # cosign keyless + provenance OIDC
  attestations: write # GitHub build-provenance attestations

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Guard — clean working tree
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree is dirty; refusing to release"; exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          # Disabled: this job publishes release artifacts; a poisonable build cache must
          # not feed it (zizmor cache-poisoning). The tagged commit builds clean.
          cache: false

      - name: Quality gate (bootstrap + verify on the tagged commit)
        run: |
          ./scripts/bootstrap.sh
          ./scripts/verify.sh

      - name: Guard — refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "::error::release ${GITHUB_REF_NAME} already exists; refusing to re-release"; exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          # Pin the version to the tag that triggered this run. Without this, when a
          # stable tag and its prerelease (e.g. v0.0.1 and v0.0.1-rc.1) point at the
          # same commit, `git describe` may resolve to the prerelease and GoReleaser
          # would target the wrong release.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Attest binary provenance (covers all archives via checksums)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
