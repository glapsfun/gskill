name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default: read-only token; jobs inherit unless they declare more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      # Restore the pinned dev tools instead of `go install`-ing them every run.
      # Keyed on the exact pinned versions, so a pin bump misses and rebuilds clean.
      - name: Cache pinned tools (./bin)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin
          key: bin-${{ runner.os }}-${{ hashFiles('.config/tool-versions') }}

      - name: Bootstrap pinned tools
        run: ./scripts/bootstrap.sh

      - name: Run the gate
        run: ./scripts/verify.sh

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  # Additive cross-platform safety net for the distribution targets — NOT a redefinition
  # of the single gate above. Validates that the darwin archives the release ships build
  # and pass race tests.
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race ./...
        env:
          CGO_ENABLED: "1"

  # Validate the release config on every PR so a tag push can't surface a broken pipeline.
  # Signing/SBOM need cosign/syft/OIDC and are exercised only by the real release job.
  # Build cache is disabled here: this job produces release-like snapshot artifacts, so a
  # poisonable cache must not feed it (zizmor cache-poisoning). Integrity > speed.
  release-dryrun:
    name: release-dryrun
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: GoReleaser snapshot (no publish)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=sign,sbom

  # Static analysis of the workflows themselves: actionlint (correctness) + zizmor
  # (security, incl. hash-pin enforcement). Same invocation as scripts/audit-workflows.sh.
  workflow-audit:
    name: workflow-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: Cache pinned tools (./bin)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin
          key: bin-${{ runner.os }}-${{ hashFiles('.config/tool-versions') }}
      - name: Bootstrap pinned tools
        run: ./scripts/bootstrap.sh
      - name: Set up uv (for uvx zizmor)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Audit workflows
        run: ./scripts/audit-workflows.sh
