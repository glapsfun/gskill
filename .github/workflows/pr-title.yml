name: PR Title

# Enforce Conventional Commits on PR titles. With squash-merge + the repo setting
# "Default to PR title for squash merge commits", the validated title becomes the only
# commit on main — exactly what GoReleaser's grouped changelog parses at release time.
# Make this a required status check in branch protection.

on:
  # zizmor: ignore[dangerous-triggers] — pull_request_target is required to read the title
  # of forked PRs; this workflow uses a read-only token and never checks out or executes
  # untrusted PR code, so the dangerous pattern does not apply. See docs/ci-cd.md.
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
