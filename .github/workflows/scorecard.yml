name: Scorecard

# OpenSSF Scorecard — supply-chain posture grade. Runs on the default branch and weekly,
# uploads SARIF to code scanning, and publishes the aggregate grade (badge in README).
# Runs only on default-branch / schedule contexts, so its write scopes never see
# untrusted forked-PR code. See docs/ci-cd.md.

on:
  push:
    branches: [main]
  schedule:
    - cron: "20 7 * * 1" # Mondays 07:20 UTC
  branch_protection_rule:

# Default read-only; the analysis job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish the result (OIDC)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
