minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$

  - repo: local
    hooks:
      - id: gofmt
        name: go format (check)
        entry: scripts/fmt.sh --check
        language: script
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: go lint
        entry: scripts/lint.sh
        language: script
        pass_filenames: false
        types: [go]

      - id: gotest-short
        name: go test (short)
        entry: scripts/test.sh --short
        language: script
        pass_filenames: false
        types: [go]

      - id: gitleaks
        name: secret scan
        entry: scripts/secrets.sh
        language: script
        pass_filenames: false

      - id: verify
        name: full verify gate
        entry: scripts/verify.sh
        language: script
        pass_filenames: false
        stages: [pre-push]
